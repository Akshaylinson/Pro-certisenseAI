version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///data/certisense.db
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
    networks:
      - certisense-network

  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - certisense-network

volumes:
  data:

networks:
  certisense-network:
    driver: bridge